<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Portfolio Interactive Spread Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root {
            /* 인디자인 규격 반영: 210mm x 210mm (1:1 비율) */
            /* 화면에 보일 한 페이지의 너비를 설정하면 높이는 자동으로 동일하게 맞춤 */
            --page-width: 450px;
            --page-height: 450px; 
            --duration: 0.8s;
        }

        @media (max-width: 1024px) {
            :root {
                --page-width: 350px;
                --page-height: 350px;
            }
        }

        @media (max-width: 768px) {
            :root {
                --page-width: 80vw;
                --page-height: 80vw;
            }
        }

        body {
            background-color: #121212;
            perspective: 2500px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Pretendard', sans-serif;
        }

        .book-container {
            position: relative;
            width: var(--page-width);
            height: var(--page-height);
            transition: transform var(--duration) ease-in-out;
            transform-style: preserve-3d;
        }

        /* 책이 펼쳐졌을 때 전체 위치 조정 (오른쪽으로 반 페이지 이동) */
        .book-container.opened {
            transform: translateX(calc(var(--page-width) / 2));
        }

        .sheet {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transform-origin: left;
            transform-style: preserve-3d;
            transition: transform var(--duration) cubic-bezier(0.645, 0.045, 0.355, 1);
            cursor: pointer;
            z-index: 1;
        }

        .page-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background: #fff;
            box-shadow: inset 3px 0 10px rgba(0,0,0,0.1), 5px 5px 15px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
        }

        .page-face.front {
            z-index: 2;
        }

        .page-face.back {
            transform: rotateY(180deg);
            z-index: 1;
        }

        /* 스프레드 이미지를 절반씩 보여주기 위한 캔버스 컨테이너 */
        .canvas-wrapper {
            position: absolute;
            top: 0;
            height: 100%;
            width: 200%; /* 스프레드는 두 페이지 너비 (420mm) */
        }

        /* 앞면(오른쪽 페이지)은 스프레드의 오른쪽 절반(210~420mm 영역)을 보여줌 */
        .front .canvas-wrapper {
            left: -100%; 
        }

        /* 뒷면(왼쪽 페이지)은 스프레드의 왼쪽 절반(0~210mm 영역)을 보여줌 */
        .back .canvas-wrapper {
            left: 0;
        }

        /* 표지 예외 처리: 표지가 210x210 단일 페이지인 경우를 대비 */
        .is-cover .canvas-wrapper {
            width: 100%;
            left: 0;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .sheet.flipped {
            transform: rotateY(-180deg);
        }

        /* 페이지 넘길 때 그림자 효과를 위한 오버레이 */
        .page-face::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: linear-gradient(to right, rgba(0,0,0,0.05), rgba(0,0,0,0));
        }

        /* 로딩 UI */
        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
        }

        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .hint {
            position: fixed;
            bottom: 2rem;
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p id="status">Portfolio Loading (210mm x 210mm Spreads)...</p>
    </div>

    <div class="book-container" id="book">
        <!-- Sheets will be injected here -->
    </div>

    <div class="hint">Click the right side to flip forward, left side to flip back.</div>

    <script>
        const pdfUrl = 'aiportfolio.pdf';
        const book = document.getElementById('book');
        const loader = document.getElementById('loader');
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let pdfDoc = null;

        async function init() {
            try {
                pdfDoc = await pdfjsLib.getDocument(pdfUrl).promise;
                const totalPages = pdfDoc.numPages;

                // 인디자인 스프레드 구조 반영 루프
                for (let i = 1; i <= totalPages; i++) {
                    createSheet(i, totalPages);
                }

                loader.style.display = 'none';
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = "Failed to load PDF. Check file path.";
            }
        }

        async function createSheet(pageNum, total) {
            const sheet = document.createElement('div');
            sheet.className = 'sheet';
            sheet.style.zIndex = total - pageNum;

            // Front (Right side of current spread)
            const front = document.createElement('div');
            front.className = 'page-face front';
            if (pageNum === 1) front.classList.add('is-cover');
            
            const frontWrapper = document.createElement('div');
            frontWrapper.className = 'canvas-wrapper';
            const canvasFront = document.createElement('canvas');
            frontWrapper.appendChild(canvasFront);
            front.appendChild(frontWrapper);

            // Back (Left side of NEXT spread)
            const back = document.createElement('div');
            back.className = 'page-face back';
            
            const backWrapper = document.createElement('div');
            backWrapper.className = 'canvas-wrapper';
            const canvasBack = document.createElement('canvas');
            backWrapper.appendChild(canvasBack);
            back.appendChild(backWrapper);

            sheet.appendChild(front);
            sheet.appendChild(back);
            book.appendChild(sheet);

            // Render
            renderSpread(pageNum, canvasFront);
            if (pageNum < total) {
                renderSpread(pageNum + 1, canvasBack);
            }

            sheet.addEventListener('click', (e) => {
                const rect = sheet.getBoundingClientRect();
                const x = e.clientX - rect.left;
                
                if (sheet.classList.contains('flipped')) {
                    if (x < rect.width) {
                        sheet.classList.remove('flipped');
                    }
                } else {
                    sheet.classList.add('flipped');
                }
                updateBookState();
            });
        }

        async function renderSpread(pageNum, canvas) {
            const page = await pdfDoc.getPage(pageNum);
            // 210mm x 210mm 규격의 고해상도 렌더링을 위해 scale 조정
            const viewport = page.getViewport({ scale: 2 });
            const ctx = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
        }

        function updateBookState() {
            const flippedCount = document.querySelectorAll('.sheet.flipped').length;
            if (flippedCount > 0) {
                book.classList.add('opened');
            } else {
                book.classList.remove('opened');
            }
            
            const sheets = document.querySelectorAll('.sheet');
            sheets.forEach((s, idx) => {
                if (s.classList.contains('flipped')) {
                    s.style.zIndex = idx + 1;
                } else {
                    s.style.zIndex = sheets.length - idx;
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
